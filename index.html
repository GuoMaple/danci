<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习课程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        
        .section {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
        }
        
        .section.active {
            display: flex;
        }
        
        /* Section A - 封面 */
        #section-a {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #section-a .cover-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 800px;
        }
        
        #section-a .cover-img {
            max-width: 70%;
            max-height: 60vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        #section-a .story-title {
            font-size: 2.5em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            text-align: center;
        }
        
        #section-a .start-btn {
            padding: 20px 60px;
            font-size: 1.5em;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            transition: all 0.3s;
        }
        
        #section-a .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255,107,107,0.5);
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 25px;
            font-size: 1em;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        /* Section B - 视频 */
        #section-b {
            background: black;
            flex-direction: column;
        }
        
        #section-b video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        #section-b .video-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 30px;
        }
        
        #section-b .video-controls.show {
            display: flex;
        }
        
        #section-b .video-controls button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #section-b .replay-btn {
            background: #4ecdc4;
            color: white;
        }
        
        #section-b .continue-btn {
            background: #ff6b6b;
            color: white;
        }
        
        #section-b .video-controls button:hover {
            transform: scale(1.05);
        }
        
        /* Section C - 单词学习 */
        #section-c, #section-e {
            flex-direction: column;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 30px;
        }
        
        #section-c h1, #section-e h1 {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        #section-c .words-container, #section-e .words-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex: 1;
            align-items: center;
        }
        
        #section-c .word-card, #section-e .word-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        #section-c .word-text, #section-e .word-text {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        
        #section-c .word-img, #section-e .word-img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        #section-c .word-buttons, #section-e .word-buttons {
            display: flex;
            gap: 15px;
        }
        
        #section-c .word-btn, #section-e .word-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        #section-c .play-btn, #section-e .play-btn {
            background: #4ecdc4;
            color: white;
        }
        
        #section-c .record-btn, #section-e .record-btn {
            background: #ff6b6b;
            color: white;
        }
        
        #section-c .record-btn.recording, #section-e .record-btn.recording {
            background: #ff0000;
            animation: pulse 1s infinite;
        }
        
        #section-c .listen-btn, #section-e .listen-btn {
            background: #667eea;
            color: white;
        }
        
        #section-c .listen-btn:disabled, #section-e .listen-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        #section-c .word-btn:hover:not(:disabled), #section-e .word-btn:hover:not(:disabled) {
            transform: scale(1.1);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        #section-c .next-btn, #section-e .next-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
            transition: all 0.3s;
        }
        
        #section-c .next-btn:hover, #section-e .next-btn:hover {
            transform: scale(1.05);
        }
        
        /* Section D - 绘本 */
        #section-d {
            background: #333;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #section-d .picture-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #section-d .picture-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        #section-d .picture-controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
        }
        
        #section-d .picture-controls button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #section-d .replay-pic-btn {
            background: #4ecdc4;
            color: white;
        }
        
        #section-d .next-pic-btn {
            background: #ff6b6b;
            color: white;
        }
        
        #section-d .picture-controls button:hover {
            transform: scale(1.05);
        }
        
        /* Section F - 练习题 */
        #section-f {
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
        }
        
        #section-f .question-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        
        #section-f .question-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        #section-f .question-number {
            font-size: 1.5em;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }
        
        #section-f .question-text {
            font-size: 2em;
            color: white;
            font-weight: bold;
            text-align: center;
        }
        
        #section-f .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 80%;
            max-width: 800px;
            flex: 1;
            align-items: center;
        }
        
        #section-f .option-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        #section-f .option-card:hover {
            transform: scale(1.03);
            border-color: #4ecdc4;
        }
        
        #section-f .option-card.selected {
            border-color: #4ecdc4;
            background: #e8f8f5;
        }
        
        #section-f .option-card.correct {
            border-color: #28a745;
            background: #d4edda;
        }
        
        #section-f .option-card.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }
        
        #section-f .option-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        #section-f .option-text {
            font-size: 1.3em;
            color: #333;
            font-weight: bold;
        }
        
        #section-f .option-label {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 35px;
            height: 35px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        #section-f .question-controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        #section-f .question-controls button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #section-f .replay-question-btn {
            background: #4ecdc4;
            color: white;
        }
        
        #section-f .next-question-btn {
            background: #ff6b6b;
            color: white;
        }
        
        #section-f .question-controls button:hover {
            transform: scale(1.05);
        }
        
        #section-f .result-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            font-size: 2em;
            display: none;
        }
        
        #section-f .result-message.show {
            display: block;
        }
        
        #section-f .result-score {
            font-size: 1.5em;
            margin-top: 20px;
            color: #4ecdc4;
        }
    </style>
</head>
<body>
    <!-- Section A - 封面 -->
    <div id="section-a" class="section active">
        <button class="back-btn" id="backBtn">返回</button>
        <div class="cover-container">
            <img src="封面.jpg" class="cover-img" alt="封面">
            <h2 class="story-title" id="storyTitle"></h2>
            <button class="start-btn" id="startBtn">开始</button>
        </div>
    </div>
    
    <!-- Section B - 开场视频 -->
    <div id="section-b" class="section">
        <video id="openingVideo" src="开场视频.mp4" playsinline></video>
        <div class="video-controls" id="videoControls">
            <button class="replay-btn" id="replayVideoBtn">重播</button>
            <button class="continue-btn" id="continueBtn">继续</button>
        </div>
    </div>
    
    <!-- Section C - 单词学习 -->
    <div id="section-c" class="section">
        <button class="back-btn" id="backBtnC">返回</button>
        <h1>学习新单词</h1>
        <div class="words-container">
            <div class="word-card">
                <div class="word-text" id="word1Text"></div>
                <img src="单词A主图.jpg" class="word-img" alt="单词A">
                <div class="word-buttons">
                    <button class="word-btn play-btn" id="playWord1Btn">🔊</button>
                    <button class="word-btn record-btn" id="recordWord1Btn">🎤</button>
                    <button class="word-btn listen-btn" id="listenWord1Btn" disabled>🎧</button>
                </div>
            </div>
            <div class="word-card">
                <div class="word-text" id="word2Text"></div>
                <img src="单词B主图.jpg" class="word-img" alt="单词B">
                <div class="word-buttons">
                    <button class="word-btn play-btn" id="playWord2Btn">🔊</button>
                    <button class="word-btn record-btn" id="recordWord2Btn">🎤</button>
                    <button class="word-btn listen-btn" id="listenWord2Btn" disabled>🎧</button>
                </div>
            </div>
        </div>
        <button class="next-btn" id="nextSectionBtn">继续</button>
    </div>
    
    <!-- Section D - 绘本 -->
    <div id="section-d" class="section">
        <div class="picture-container">
            <img class="picture-img" id="pictureImg" src="">
        </div>
        <audio id="pictureAudio">
        <div class="picture-controls" id="pictureControls">
            <button class="replay-pic-btn" id="replayPicBtn">重播</button>
            <button class="next-pic-btn" id="nextPicBtn">下一页</button>
        </div>
    </div>
    
    <!-- Section E - 复习单词（与C一致） -->
    <div id="section-e" class="section">
        <button class="back-btn" id="backBtnE">返回</button>
        <h1>复习单词</h1>
        <div class="words-container">
            <div class="word-card">
                <div class="word-text" id="word1TextE"></div>
                <img src="单词A主图.jpg" class="word-img" alt="单词A">
                <div class="word-buttons">
                    <button class="word-btn play-btn" id="playWord1BtnE">🔊</button>
                    <button class="word-btn record-btn" id="recordWord1BtnE">🎤</button>
                    <button class="word-btn listen-btn" id="listenWord1BtnE" disabled>🎧</button>
                </div>
            </div>
            <div class="word-card">
                <div class="word-text" id="word2TextE"></div>
                <img src="单词B主图.jpg" class="word-img" alt="单词B">
                <div class="word-buttons">
                    <button class="word-btn play-btn" id="playWord2BtnE">🔊</button>
                    <button class="word-btn record-btn" id="recordWord2BtnE">🎤</button>
                    <button class="word-btn listen-btn" id="listenWord2BtnE" disabled>🎧</button>
                </div>
            </div>
        </div>
        <button class="next-btn" id="nextSectionBtnE">继续</button>
    </div>
    
    <!-- Section F - 练习题 -->
    <div id="section-f" class="section">
        <button class="back-btn" id="backBtnF">返回</button>
        <div class="question-container">
            <div class="question-header">
                <div class="question-number" id="questionNumber"></div>
                <div class="question-text" id="questionText"></div>
            </div>
            <div class="options-container" id="optionsContainer"></div>
            <div class="question-controls">
                <button class="replay-question-btn" id="replayQuestionBtn">重播</button>
                <button class="next-question-btn" id="nextQuestionBtn" disabled>下一题</button>
            </div>
        </div>
        <div class="result-message" id="resultMessage">
            <div>练习完成！</div>
            <div class="result-score" id="resultScore"></div>
        </div>
    </div>
    
    <script>
        const storyTitle = '小猫和小狗的故事';
        const word1Text = 'dog 狗';
        const word2Text = 'cat 猫';
        const totalPictures = 6;
        let currentPicture = 1;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        
        let recording1Exists = false;
        let recording2Exists = false;
        
        let recording1ExistsE = false;
        let recording2ExistsE = false;
        
        const questions = [
            {
                question: '"dog" 的中文意思是什么？',
                options: [
                    { label: 'A', text: '猫', img: '题目1选项A.jpg' },
                    { label: 'B', text: '狗', img: '题目1选项B.jpg' },
                    { label: 'C', text: '鸟', img: '题目1选项C.jpg' },
                    { label: 'D', text: '鱼', img: '题目1选项D.jpg' }
                ],
                answer: 'B',
                audio: '题目1朗读.mp3'
            },
            {
                question: '"cat" 的中文意思是什么？',
                options: [
                    { label: 'A', text: '狗', img: '题目2选项A.jpg' },
                    { label: 'B', text: '鸟', img: '题目2选项B.jpg' },
                    { label: 'C', text: '猫', img: '题目2选项C.jpg' },
                    { label: 'D', text: '鱼', img: '题目2选项D.jpg' }
                ],
                answer: 'C',
                audio: '题目2朗读.mp3'
            },
            {
                question: '故事里，小 dog 和小 cat 在哪里一起玩耍？',
                options: [
                    { label: 'A', text: '在游泳池边', img: '题目3选项A.jpg' },
                    { label: 'B', text: '在花园里', img: '题目3选项B.jpg' },
                    { label: 'C', text: '在教室里', img: '题目3选项C.jpg' },
                    { label: 'D', text: '在超市里', img: '题目3选项D.jpg' }
                ],
                answer: 'B',
                audio: '题目3朗读.mp3'
            }
        ];
        
        let currentQuestion = 0;
        let score = 0;
        let selectedOption = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('storyTitle').textContent = storyTitle;
            document.getElementById('word1Text').textContent = word1Text;
            document.getElementById('word2Text').textContent = word2Text;
            document.getElementById('word1TextE').textContent = word1Text;
            document.getElementById('word2TextE').textContent = word2Text;
            
            checkRecordings();
            setupEventListeners();
        });
        
        function setupEventListeners() {
            document.getElementById('startBtn').addEventListener('click', goToSectionB);
            document.getElementById('continueBtn').addEventListener('click', goToSectionC);
            document.getElementById('replayVideoBtn').addEventListener('click', replayVideo);
            document.getElementById('nextSectionBtn').addEventListener('click', goToSectionD);
            
            document.getElementById('playWord1Btn').addEventListener('click', () => playAudio('单词A发音.mp3'));
            document.getElementById('playWord2Btn').addEventListener('click', () => playAudio('单词B发音.mp3'));
            
            setupRecordingButtons();
            
            document.getElementById('listenWord1Btn').addEventListener('click', () => playAudio('录音1.mp3'));
            document.getElementById('listenWord2Btn').addEventListener('click', () => playAudio('录音2.mp3'));
            
            document.getElementById('replayPicBtn').addEventListener('click', replayCurrentAudio);
            document.getElementById('nextPicBtn').addEventListener('click', nextPicture);
            
            document.getElementById('openingVideo').addEventListener('ended', showVideoControls);
            
            setupSectionEListeners();
            setupSectionFListeners();
        }
        
        function setupSectionEListeners() {
            document.getElementById('playWord1BtnE').addEventListener('click', () => playAudio('单词A发音.mp3'));
            document.getElementById('playWord2BtnE').addEventListener('click', () => playAudio('单词B发音.mp3'));
            
            const recordBtn1E = document.getElementById('recordWord1BtnE');
            const recordBtn2E = document.getElementById('recordWord2BtnE');
            
            recordBtn1E.addEventListener('mousedown', () => startRecordingE(1));
            recordBtn1E.addEventListener('mouseup', () => stopRecordingE());
            recordBtn1E.addEventListener('mouseleave', () => stopRecordingE());
            recordBtn1E.addEventListener('touchstart', (e) => { e.preventDefault(); startRecordingE(1); });
            recordBtn1E.addEventListener('touchend', () => stopRecordingE());
            
            recordBtn2E.addEventListener('mousedown', () => startRecordingE(2));
            recordBtn2E.addEventListener('mouseup', () => stopRecordingE());
            recordBtn2E.addEventListener('mouseleave', () => stopRecordingE());
            recordBtn2E.addEventListener('touchstart', (e) => { e.preventDefault(); startRecordingE(2); });
            recordBtn2E.addEventListener('touchend', () => stopRecordingE());
            
            document.getElementById('listenWord1BtnE').addEventListener('click', () => playAudio('录音1E.mp3'));
            document.getElementById('listenWord2BtnE').addEventListener('click', () => playAudio('录音2E.mp3'));
            
            document.getElementById('nextSectionBtnE').addEventListener('click', goToSectionF);
        }
        
        function setupSectionFListeners() {
            document.getElementById('replayQuestionBtn').addEventListener('click', replayQuestionAudio);
            document.getElementById('nextQuestionBtn').addEventListener('click', nextQuestion);
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }
        
        function goToSectionB() {
            showSection('section-b');
            document.getElementById('openingVideo').play();
        }
        
        function showVideoControls() {
            document.getElementById('videoControls').classList.add('show');
        }
        
        function replayVideo() {
            document.getElementById('videoControls').classList.remove('show');
            document.getElementById('openingVideo').currentTime = 0;
            document.getElementById('openingVideo').play();
        }
        
        function goToSectionC() {
            showSection('section-c');
        }
        
        function goToSectionD() {
            showSection('section-d');
            currentPicture = 1;
            loadPicture();
        }
        
        function playAudio(src) {
            const audio = new Audio(src);
            audio.play().catch(e => console.log('播放音频失败:', e));
        }
        
        function setupRecordingButtons() {
            const recordBtn1 = document.getElementById('recordWord1Btn');
            const recordBtn2 = document.getElementById('recordWord2Btn');
            
            recordBtn1.addEventListener('mousedown', () => startRecording(1));
            recordBtn1.addEventListener('mouseup', () => stopRecording());
            recordBtn1.addEventListener('mouseleave', () => stopRecording());
            recordBtn1.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(1); });
            recordBtn1.addEventListener('touchend', () => stopRecording());
            
            recordBtn2.addEventListener('mousedown', () => startRecording(2));
            recordBtn2.addEventListener('mouseup', () => stopRecording());
            recordBtn2.addEventListener('mouseleave', () => stopRecording());
            recordBtn2.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(2); });
            recordBtn2.addEventListener('touchend', () => stopRecording());
        }
        
        let currentRecordingNum = 0;
        
        async function startRecording(num) {
            try {
                currentRecordingNum = num;
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    saveRecording();
                };
                
                mediaRecorder.start();
                
                if (num === 1) {
                    document.getElementById('recordWord1Btn').classList.add('recording');
                } else {
                    document.getElementById('recordWord2Btn').classList.add('recording');
                }
                
                recordingTimer = setTimeout(() => {
                    stopRecording();
                }, 3000);
                
            } catch (e) {
                console.error('录音失败:', e);
                alert('无法访问麦克风，请检查权限设置');
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            
            if (recordingTimer) {
                clearTimeout(recordingTimer);
                recordingTimer = null;
            }
            
            document.getElementById('recordWord1Btn').classList.remove('recording');
            document.getElementById('recordWord2Btn').classList.remove('recording');
        }
        
        function saveRecording() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
            const url = URL.createObjectURL(audioBlob);
            
            if (currentRecordingNum === 1) {
                recording1Exists = true;
                document.getElementById('listenWord1Btn').disabled = false;
                window.recordedAudio1 = url;
            } else {
                recording2Exists = true;
                document.getElementById('listenWord2Btn').disabled = false;
                window.recordedAudio2 = url;
            }
        }
        
        let currentRecordingNumE = 0;
        
        async function startRecordingE(num) {
            try {
                currentRecordingNumE = num;
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    saveRecordingE();
                };
                
                mediaRecorder.start();
                
                if (num === 1) {
                    document.getElementById('recordWord1BtnE').classList.add('recording');
                } else {
                    document.getElementById('recordWord2BtnE').classList.add('recording');
                }
                
                recordingTimer = setTimeout(() => {
                    stopRecordingE();
                }, 3000);
                
            } catch (e) {
                console.error('录音失败:', e);
                alert('无法访问麦克风，请检查权限设置');
            }
        }
        
        function stopRecordingE() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            
            if (recordingTimer) {
                clearTimeout(recordingTimer);
                recordingTimer = null;
            }
            
            document.getElementById('recordWord1BtnE').classList.remove('recording');
            document.getElementById('recordWord2BtnE').classList.remove('recording');
        }
        
        function saveRecordingE() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
            const url = URL.createObjectURL(audioBlob);
            
            if (currentRecordingNumE === 1) {
                recording1ExistsE = true;
                document.getElementById('listenWord1BtnE').disabled = false;
                window.recordedAudio1E = url;
            } else {
                recording2ExistsE = true;
                document.getElementById('listenWord2BtnE').disabled = false;
                window.recordedAudio2E = url;
            }
        }
        
        function checkRecordings() {
        }
        
        function loadPicture() {
            document.getElementById('pictureImg').src = `绘本画面 ${currentPicture}.jpg`;
            const audio = document.getElementById('pictureAudio');
            audio.src = `绘本画面 ${currentPicture} 配音.mp3`;
            audio.play().catch(e => console.log('播放音频失败:', e));
        }
        
        function replayCurrentAudio() {
            const audio = document.getElementById('pictureAudio');
            audio.currentTime = 0;
            audio.play().catch(e => console.log('播放音频失败:', e));
        }
        
        function nextPicture() {
            if (currentPicture < totalPictures) {
                currentPicture++;
                loadPicture();
            } else {
                goToSectionE();
            }
        }
        
        function goToSectionE() {
            showSection('section-e');
        }
        
        function goToSectionF() {
            showSection('section-f');
            currentQuestion = 0;
            score = 0;
            loadQuestion();
        }
        
        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} / ${questions.length} 题`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option) => {
                const optionCard = document.createElement('div');
                optionCard.className = 'option-card';
                optionCard.innerHTML = `
                    <div class="option-label">${option.label}</div>
                    <img src="${option.img}" class="option-img" alt="${option.text}">
                    <div class="option-text">${option.text}</div>
                `;
                optionCard.addEventListener('click', () => selectOption(option.label));
                optionsContainer.appendChild(optionCard);
            });
            
            document.getElementById('nextQuestionBtn').disabled = true;
            selectedOption = null;
            
            playAudio(question.audio);
        }
        
        function selectOption(label) {
            if (selectedOption !== null) return;
            
            selectedOption = label;
            const question = questions[currentQuestion];
            const optionCards = document.querySelectorAll('.option-card');
            
            optionCards.forEach((card, index) => {
                const optionLabel = question.options[index].label;
                card.style.pointerEvents = 'none';
                
                if (optionLabel === label) {
                    if (label === question.answer) {
                        card.classList.add('correct');
                        score++;
                    } else {
                        card.classList.add('wrong');
                    }
                } else if (optionLabel === question.answer) {
                    card.classList.add('correct');
                }
            });
            
            document.getElementById('nextQuestionBtn').disabled = false;
        }
        
        function replayQuestionAudio() {
            const question = questions[currentQuestion];
            playAudio(question.audio);
        }
        
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResult();
            }
        }
        
        function showResult() {
            document.getElementById('resultScore').textContent = `得分：${score} / ${questions.length}`;
            document.getElementById('resultMessage').classList.add('show');
        }
    </script>
